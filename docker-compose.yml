version: "3.9"

services:

  # ── FastAPI anomaly scoring service ───────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: forex-anomaly-system:latest
    container_name: forex_anomaly_api
    command: >
      uvicorn src.api:app
        --host 0.0.0.0
        --port 8000
        --workers 2
        --log-level info
    ports:
      - "8000:8000"
    volumes:
      - forex_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Streamlit monitoring dashboard ────────────────────────────────────────
  dashboard:
    image: forex-anomaly-system:latest
    container_name: forex_anomaly_dashboard
    command: >
      streamlit run app/dashboard.py
        --server.port 8501
        --server.address 0.0.0.0
        --server.headless true
    ports:
      - "8501:8501"
    volumes:
      - forex_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

# ── Shared named volume — persists data/ and model artefacts ──────────────
volumes:
  forex_data:
    driver: local
